<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trulax Remedies</title>
<link rel="stylesheet" href="assets/styles.css">
<style>
.product-page{padding:140px 0 60px 0}
.product-hero{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:start}
.product-gallery{display:flex;flex-direction:column;gap:15px;max-width:500px;width:100%}
.main-image{background:#fff;border-radius:20px;width:100%;max-width:500px;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;overflow:hidden;border:1px solid #E8F5E9}
.main-image img{max-width:100%;max-height:100%;object-fit:contain}
.thumbnail-wrapper{display:flex;align-items:center;gap:10px;width:100%;max-width:500px}
.thumb-nav{width:36px;height:36px;border-radius:50%;border:1px solid #ddd;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.3s ease}
.thumb-nav:hover{background:#E8F5E9;border-color:#2E7D32}
.thumb-nav:disabled{opacity:0.3;cursor:not-allowed}
.thumb-nav svg{width:16px;height:16px;fill:#2E7D32}
.thumbnail-container{flex:1;overflow:hidden}
.thumbnail-row{display:flex;gap:10px;transition:transform 0.3s ease}
.thumbnail{width:80px;height:80px;border-radius:10px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:all 0.3s ease;background:#F5F5F0;flex-shrink:0}
.thumbnail:hover,.thumbnail.active{border-color:#2E7D32;box-shadow:0 2px 8px rgba(46,125,50,0.3)}
.thumbnail img{width:100%;height:100%;object-fit:cover}
.product-details h1{font-size:2.5rem;margin-bottom:20px;color:#2C1810}
.product-details p{color:#5D4037;font-size:1.1rem}
.product-details ul{list-style:none;padding:0;margin:20px 0}
.product-details ul li{padding:8px 0;color:#3E2723;font-size:1rem}
.price{font-size:2rem;color:#2E7D32;font-weight:700;margin:20px 0}
.quantity{display:flex;gap:15px;align-items:center;margin:20px 0}
.quantity input{width:80px;padding:10px;border:1px solid #ddd;border-radius:8px}
.buy-btn{padding:16px 40px;font-size:1.1rem;display:inline-block;text-align:center}

@media(max-width:1024px){
  .product-hero{grid-template-columns:1fr 1fr;gap:40px}
  .product-gallery{max-width:100%}
  .main-image{max-width:100%}
  .thumbnail-wrapper{max-width:100%}
  .product-details h1{font-size:2rem}
}

@media(max-width:768px){
  .product-page{padding:120px 0 40px 0}
  .product-hero{grid-template-columns:1fr;gap:30px}
  .product-gallery{max-width:100%;margin:0 auto}
  .main-image{max-width:100%;height:auto;min-height:300px}
  .thumbnail-wrapper{max-width:100%}
  .thumbnail{width:60px;height:60px}
  .product-details{text-align:center}
  .product-details h1{font-size:1.75rem}
  .product-details ul{text-align:left;max-width:280px;margin:20px auto}
  .buy-btn{width:100%;padding:14px 30px}
}

@media(max-width:480px){
  .product-page{padding:100px 0 30px 0}
  .main-image{min-height:250px}
  .thumbnail{width:50px;height:50px}
  .thumb-nav{width:30px;height:30px}
  .thumb-nav svg{width:14px;height:14px}
  .product-details h1{font-size:1.5rem}
  .price{font-size:1.75rem}
}
</style>
</head>
<body>

<div class="container">
<nav class="nav">
<a href="index.html" class="logo">
<div class="logo-icon"><img src="images/logo.png" alt="Logo"></div>
</a>
<ul class="nav-menu">

<li><a href="index.html#contact" class="nav-link">Contact</a></li>

</nav>
</div>
</header>

                <div class="thumbnail" onclick="changeImage('images/E-COMMERCE 4.PNG', this)">
                    <img src="images/E-COMMERCE 4.PNG" alt="ACV View 5">

                <div class="thumbnail" onclick="changeImage('images/E-COMMERCE 5.PNG', this)">
                    <img src="images/E-COMMERCE 5.PNG" alt="ACV View 6">

                <div class="thumbnail" onclick="changeImage('images/E-COMMERCE 6.png', this)">
                    <img src="images/E-COMMERCE 6.png" alt="ACV View 7">

<script>
let thumbOffset = 0;

function getThumbSettings() {
    const width = window.innerWidth;
    if (width <= 480) {
        return { thumbWidth: 60, visibleThumbs: 3 };
    } else if (width <= 768) {
        return { thumbWidth: 70, visibleThumbs: 4 };
    } else {
        return { thumbWidth: 90, visibleThumbs: 4 };
    }
}

function changeImage(src, el) {
    document.getElementById('mainImg').src = src;
    document.querySelectorAll('.thumbnail').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
}

function scrollThumbs(dir) {
    const row = document.getElementById('thumbRow');
    const totalThumbs = row.children.length;
    const settings = getThumbSettings();
    const maxOffset = Math.max(0, totalThumbs - settings.visibleThumbs);
    
    thumbOffset += dir;
    thumbOffset = Math.max(0, Math.min(thumbOffset, maxOffset));
    
    row.style.transform = `translateX(-${thumbOffset * settings.thumbWidth}px)`;
    updateNavButtons(totalThumbs);
}

function updateNavButtons(total) {
    const settings = getThumbSettings();
    document.getElementById('prevBtn').disabled = thumbOffset === 0;
    document.getElementById('nextBtn').disabled = thumbOffset >= total - settings.visibleThumbs;
}

function handleResize() {
    thumbOffset = 0;
    const row = document.getElementById('thumbRow');
    row.style.transform = 'translateX(0)';
    const total = row.children.length;
    updateNavButtons(total);
}

document.addEventListener('DOMContentLoaded', function() {
    const total = document.getElementById('thumbRow').children.length;
    updateNavButtons(total);
});

window.addEventListener('resize', handleResize);
</script>
</body>
